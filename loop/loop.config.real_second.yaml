# Configuration for real run on Solid-state battery commercialization
mode: storm_option_b
max_iterations: 15
state_file: "STATE_REAL_SECOND.yaml"
batch_size: 100
topic_concurrency: 1

roles:
  planner_verifier: "google/gemini-2.5-flash"
  executor_swarm: "google/gemini-2.5-flash"

storm:
  max_perspective: 5
  max_conv_turn: 3
  search_top_k: 3
  retriever: "duckduckgo"

nav_toor:
  required_perspectives:
    - id: "practitioner"
      label: "Practitioner"
      focus: "Daily realities academics miss"
    - id: "academic"
      label: "Academic"
      focus: "Peer-reviewed evidence vs popular belief"
    - id: "skeptic"
      label: "Skeptic"
      focus: "Counterarguments proponents ignore"
    - id: "economist"
      label: "Economist"
      focus: "Financial incentives shaping research"
    - id: "historian"
      label: "Historian"
      focus: "Patterns from similar past cases"
  contradiction_map_min_clashes: 3
  synthesis_min_findings: 5
  peer_review_min_confidence: 7
  min_word_count: 500
  min_outline_depth: 2

topics:
  - "Solid-state battery commercialization"
